# Ephemeral APIM provisioning workflow.
#
# Triggered when a PR is labelled `preview`. Deploys a short-lived APIM
# instance (named after the PR number) using the Bicep template under
# `infra/` so reviewers can validate policies and OpenAPI contracts end-to-end.
#
# This file is a demonstration scaffold. To make it functional:
#   1. Configure the `azure/login` action with an OIDC-enabled service
#      principal (Federated Credentials). Store the client / tenant /
#      subscription IDs as repository secrets.
#   2. Pre-create the target resource group OR change the deployment to a
#      subscription-scoped one.
#   3. Plug in your VNet / private DNS zone IDs in `infra/main.parameters.json`.
#
# Cleanup is handled by a companion workflow on PR close (left as TODO).

name: ephemeral-apim

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  id-token: write   # required for OIDC login to Azure
  contents: read
  pull-requests: write

jobs:
  provision:
    if: contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    concurrency:
      group: ephemeral-apim-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      APIM_NAME: contoso-apim-pr-${{ github.event.pull_request.number }}
      RESOURCE_GROUP: rg-apim-ephemeral
      LOCATION: australiaeast
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download Policy Toolkit packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v1.0.0 \
            --repo Azure/azure-api-management-policy-toolkit \
            --pattern "*.nupkg" \
            --dir packages/

      - name: Build & compile policies to XML
        run: |
          dotnet restore APIMPolicies.sln
          dotnet tool restore
          dotnet build APIMPolicies.sln -c Release --no-restore
          dotnet azure-apim-policy-compiler \
            --s ./src/Contoso.Apis.Policies \
            --o ./dist/policies \
            --format true

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy APIM (Bicep)
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            apimName=${{ env.APIM_NAME }}
            location=${{ env.LOCATION }}
            publisherEmail=apis@contoso.example
            publisherName="Contoso APIs"
            sku=StandardV2
            virtualNetworkType=None
            deployVirtualNetwork=false

      - name: Merge policies into APIOps artifacts
        shell: pwsh
        run: >-
          ./scripts/merge-policies-to-apiops.ps1
          -ArtifactsPath ./apim-artifacts
          -DistPath ./dist/policies

      - name: Download APIOps publisher
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v7.0.3 --repo Azure/apiops \
            --pattern "publisher-linux-x64.zip" --dir /tmp/apiops
          cd /tmp/apiops && unzip publisher-linux-x64.zip && chmod +x publisher
          echo "/tmp/apiops" >> $GITHUB_PATH

      - name: Publish to ephemeral APIM (APIOps)
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP_NAME: ${{ env.RESOURCE_GROUP }}
          API_MANAGEMENT_SERVICE_OUTPUT_FOLDER_PATH: ${{ github.workspace }}/apim-artifacts
          API_MANAGEMENT_SERVICE_NAME: ${{ env.APIM_NAME }}
        run: publisher

      - name: Run smoke tests
        if: success()
        env:
          APIM_GATEWAY_URL: https://${{ env.APIM_NAME }}.azure-api.net
        run: |
          dotnet test tests/Contoso.Apis.SmokeTests/Contoso.Apis.SmokeTests.csproj \
            -c Release --nologo \
            --logger 'trx;LogFileName=smoke-results.trx'
        continue-on-error: true  # don't block PR on smoke failures during preview

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: '**/TestResults/smoke-results.trx'

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const apim = process.env.APIM_NAME;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Ephemeral APIM **${apim}** provisioning kicked off. Gateway URL will be available shortly.`
            });
