# CI workflow — runs on every PR and push to main.
#
# Mirrors dev-test.sh / dev-test.ps1: build, unit test, compile policies,
# merge into APIOps artifacts, lint OpenAPI, diff for breaking changes.
# Smoke tests are NOT included — they run post-deployment (see ephemeral-apim.yml).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write  # required for OIDC login to Azure (deploy-dev job)

jobs:
  build-test:
    name: Build, Test & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for openapi-diff baseline

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set up Node.js (for Spectral)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download Policy Toolkit packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v1.0.0 \
            --repo Azure/azure-api-management-policy-toolkit \
            --pattern "*.nupkg" \
            --dir packages/
          ls -la packages/*.nupkg

      - name: Restore
        run: |
          dotnet restore APIMPolicies.sln
          dotnet tool restore

      - name: Build
        run: dotnet build APIMPolicies.sln -c Release --no-restore --nologo

      - name: Unit tests
        run: |
          dotnet test APIMPolicies.sln -c Release --no-build --nologo \
            --filter "FullyQualifiedName!~SmokeTests" \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"

      - name: Compile policies to XML
        run: |
          mkdir -p dist/policies
          dotnet azure-apim-policy-compiler \
            --s ./src/Contoso.Apis.Policies/Documents \
            --o ./dist/policies \
            --format true

      - name: Merge policies into APIOps artifacts
        shell: pwsh
        run: >-
          ./scripts/merge-policies-to-apiops.ps1
          -ArtifactsPath ./apim-artifacts
          -DistPath ./dist/policies

      - name: Upload APIOps artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apim-artifacts
          path: apim-artifacts/

      - name: Spectral lint OpenAPI
        run: |
          npx --yes @stoplight/spectral-cli lint --ruleset .spectral.yml \
            "openapi/**/*.{yaml,yml,json}"

      - name: OpenAPI breaking-change diff
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: bash scripts/openapi-diff.sh origin/${{ github.base_ref }}

  # ===========================================================================
  # Deploy to dev — runs after build-test, only on pushes to main.
  # Uses APIOps publisher to push the merged artifact tree to the dev APIM.
  # ===========================================================================
  deploy-dev:
    name: Deploy to Dev (APIOps)
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Download APIOps artifacts
        uses: actions/download-artifact@v4
        with:
          name: apim-artifacts
          path: apim-artifacts/

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download APIOps publisher
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v7.0.3 --repo Azure/apiops \
            --pattern "publisher-linux-x64.zip" --dir /tmp/apiops
          cd /tmp/apiops && unzip publisher-linux-x64.zip && chmod +x publisher
          echo "/tmp/apiops" >> $GITHUB_PATH

      - name: Publish to dev APIM
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP_NAME: rg-apim-poc
          API_MANAGEMENT_SERVICE_OUTPUT_FOLDER_PATH: ${{ github.workspace }}/apim-artifacts
          CONFIGURATION_YAML_PATH: ${{ github.workspace }}/apim-artifacts/configuration.dev.yaml
          COMMIT_ID: ${{ github.sha }}
        run: publisher

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Smoke tests
        env:
          APIM_GATEWAY_URL: ${{ secrets.APIM_GATEWAY_URL }}
          APIM_SUBSCRIPTION_KEY: ${{ secrets.APIM_SUBSCRIPTION_KEY }}
        run: |
          dotnet test tests/Contoso.Apis.SmokeTests/Contoso.Apis.SmokeTests.csproj \
            -c Release --nologo --logger "trx;LogFileName=smoke-results.trx"

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: "**/TestResults/smoke-results.trx"
