openapi: 3.0.3
info:
  title: Animalstore API
  description: |
    Minimal example API used to exercise the Spectral linter and the
    policy compilation pipeline. Replace with your real API contract.
  version: 1.1.0
  contact:
    name: Contoso API Platform Team
    email: apis@contoso.example
  license:
    name: MIT
servers:
  - url: https://api.contoso.example/animalstore/v1
    description: Production
tags:
  - name: animals
    description: Operations on animals
paths:
  /animals:
    get:
      summary: List animals
      operationId: listAnimals
      tags: [animals]
      parameters:
        - name: limit
          in: query
          description: Maximum number of animals to return.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of animals.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Animals'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create an animal
      operationId: createAnimal
      tags: [animals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAnimal'
      responses:
        '201':
          description: Animal created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Animal'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /animals/{animalId}:
    get:
      summary: Get an animal by id
      operationId: getAnimalById
      tags: [animals]
      parameters:
        - name: animalId
          in: path
          required: true
          description: Unique identifier of the animal.
          schema:
            type: string
      responses:
        '200':
          description: The requested animal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Animal'
        '404':
          description: Animal not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Animal:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        tag:
          type: string
        species:
          type: string
          description: The species of the animal (e.g. dog, cat, bird).
    NewAnimal:
      type: object
      required: [name]
      properties:
        name:
          type: string
        tag:
          type: string
    Animals:
      type: array
      items:
        $ref: '#/components/schemas/Animal'
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
