# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/apiops/main/configuration.schema.json
#
# APIOps environment overrides for DEV.
# The APIOps publisher merges these values on top of the base artifact tree
# at deploy time. Only values that differ from the baseline need entries here.
#
# Usage:
#   apiops publish --configuration-file configuration.dev.yaml
#
apimServiceName: apim-poc-8fdc26ac

namedValues:
  - name: auth0-tenant-domain
    properties:
      value: dev-contoso.auth0.com
  - name: auth0-audience
    properties:
      value: https://api.dev.contoso.example

apis:
  - name: petstore
    properties:
      serviceUrl: https://echoapi.cloudapp.net/api
  - name: animalstore
    properties:
      serviceUrl: https://echoapi.cloudapp.net/api
      isCurrent: false
  - name: "animalstore;rev=2"
    properties:
      serviceUrl: https://echoapi.cloudapp.net/api
      isCurrent: true
