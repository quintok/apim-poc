# Buildkite pipeline for the Azure APIM Policy Development Pipeline.
#
# Mirrors `./dev-test.sh` so the local and CI experiences stay in lock-step.
# Adjust `agents:` queues and `plugins:` to match your Buildkite cluster.

steps:
  - label: ":dotnet: Build & Test"
    key: build-test
    command:
      - "gh release download v1.0.0 --repo Azure/azure-api-management-policy-toolkit --pattern '*.nupkg' --dir packages/"
      - "dotnet restore APIMPolicies.sln"
      - "dotnet tool restore"
      - "dotnet build APIMPolicies.sln -c Release --no-restore"
      - "dotnet test APIMPolicies.sln -c Release --no-build --filter 'FullyQualifiedName!~SmokeTests' --logger 'trx;LogFileName=test-results.trx'"
    artifact_paths:
      - "**/TestResults/*.trx"
    plugins:
      - docker#v5.11.0:
          image: "mcr.microsoft.com/dotnet/sdk:8.0"
          workdir: /workdir

  - label: ":hammer_and_wrench: Compile policies to XML"
    key: compile-policies
    depends_on: build-test
    command:
      - "gh release download v1.0.0 --repo Azure/azure-api-management-policy-toolkit --pattern '*.nupkg' --dir packages/"
      - "dotnet tool restore"
      - "dotnet azure-apim-policy-compiler --s ./src/Contoso.Apis.Policies/Documents --o ./dist/policies --format true"
    artifact_paths:
      - "dist/policies/**/*.xml"
    plugins:
      - docker#v5.11.0:
          image: "mcr.microsoft.com/dotnet/sdk:8.0"
          workdir: /workdir

  - label: ":mag: Spectral lint OpenAPI"
    key: spectral
    command:
      - "npx --yes @stoplight/spectral-cli lint --ruleset .spectral.yml 'openapi/**/*.{yaml,yml,json}'"
    plugins:
      - docker#v5.11.0:
          image: "node:20-alpine"
          workdir: /workdir

  - label: ":left_right_arrow: OpenAPI breaking-change diff"
    key: openapi-diff
    soft_fail:
      # Don't block merges on breaking changes — surface them as warnings.
      # Flip to `false` once the team is ready to enforce.
      - exit_status: 1
    command:
      - "bash scripts/openapi-diff.sh ${BUILDKITE_PULL_REQUEST_BASE_BRANCH:-origin/main}"
    plugins:
      - docker#v5.11.0:
          image: "node:20-alpine"
          workdir: /workdir

  - wait: ~

  - label: ":package: Merge policies into APIOps artifacts"
    key: merge-apiops
    depends_on:
      - compile-policies
      - spectral
    command:
      - "buildkite-agent artifact download 'dist/policies/**/*.xml' ."
      - "pwsh ./scripts/merge-policies-to-apiops.ps1 -ArtifactsPath ./apim-artifacts -DistPath ./dist/policies"
      - "tar -czf apim-artifacts.tar.gz -C . apim-artifacts"
    artifact_paths:
      - "apim-artifacts.tar.gz"
      - "apim-artifacts/**/*"
    plugins:
      - docker#v5.11.0:
          image: "mcr.microsoft.com/dotnet/sdk:8.0"
          workdir: /workdir

  # Optional: trigger ephemeral APIM provisioning via GitHub Actions when a
  # PR is labelled `preview`. Implemented in `.github/workflows/`.

  # ---------------------------------------------------------------------------
  # Smoke tests — run after APIOps deploys to a live APIM gateway.
  # These are NOT part of the offline build/test/lint pipeline. They execute
  # against a real gateway and require APIM_GATEWAY_URL + subscription keys.
  #
  # In a full pipeline this step would:
  #   1. Wait for APIOps publisher to finish deploying to the target env
  #   2. Set APIM_GATEWAY_URL and per-API subscription key env vars
  #   3. Run: dotnet test tests/Contoso.Apis.SmokeTests -c Release
  #
  # Example (uncomment and wire to your deploy step):
  # ---------------------------------------------------------------------------
  # - label: ":smoking: Smoke tests (post-deploy)"
  #   key: smoke-tests
  #   depends_on: deploy-apiops   # depends on your APIOps deploy step
  #   command:
  #     - "dotnet test tests/Contoso.Apis.SmokeTests/Contoso.Apis.SmokeTests.csproj -c Release --nologo --logger 'trx;LogFileName=smoke-results.trx'"
  #   env:
  #     APIM_GATEWAY_URL: "${APIM_GATEWAY_URL}"
  #     APIM_SUBSCRIPTION_KEY__ECHO_API: "${APIM_SUBSCRIPTION_KEY__ECHO_API}"
  #     APIM_SUBSCRIPTION_KEY__PETSTORE: "${APIM_SUBSCRIPTION_KEY__PETSTORE}"
  #   artifact_paths:
  #     - "**/TestResults/smoke-results.trx"
  #   plugins:
  #     - docker#v5.11.0:
  #         image: "mcr.microsoft.com/dotnet/sdk:8.0"
  #         workdir: /workdir
